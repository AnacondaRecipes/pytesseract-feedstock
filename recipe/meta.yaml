{% set name = "pytesseract" %}
{% set version = "0.3.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/madmaze/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 454ca16dc7fa59aa9c8ba42500992531773fbdc04caef1b39611755cae9f34bf

build:
  number: 0
  # tesseract is not available on s390x. win-64 was enabled in PKG-13890.
  skip: True  # [py<37 or s390x]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pytesseract = pytesseract.pytesseract:main

requirements:
  host:
    - python
    - pip
    - setuptools >=40.0.4
    - wheel >=0.29.0
    # tesseract is CBC-pinned, so the linter wants it in host; its run_exports
    # then pin the run dependency below.
    - tesseract {{ tesseract }}
  run:
    - python
    - pillow >=8.0.0
    - packaging >=21.3
    - tesseract {{ tesseract }}

test:
  imports:
    - PIL
    - PIL.Image
    - pytesseract
  files:
    # eurotext.expected.txt is the OCR baseline run_test.py compares against,
    # copied from tesseract-feedstock so both packages test the same output.
    - eurotext.tif
    - eurotext.expected.txt
  requires:
    - pip
  commands:
    - python -m pip check
    # Smoke test the CLI entry point runs (locates the tesseract binary).
    - pytesseract -l eng eurotext.tif
    # The OCR correctness check lives in run_test.py (auto-discovered by
    # conda-build): it compares image_to_string output to eurotext.expected.txt.

about:
  home: https://github.com/madmaze/pytesseract
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Python-tesseract is an optical character recognition (OCR) tool for python.

  description: |
    Python-tesseract is a wrapper for Google's Tesseract-OCR Engine.
    It is also useful as a stand-alone invocation script to tesseract,
    as it can read all image types supported by the Pillow and Leptonica
    imaging libraries, including jpeg, png, gif, bmp, tiff, and others.
    Additionally, if used as a script, Python-tesseract will print the
    recognized text instead of writing it to a file
  dev_url: https://github.com/madmaze/pytesseract
  doc_url: https://github.com/madmaze/pytesseract/blob/master/README.rst


extra:
  recipe-maintainers:
    - mxr-conda
    - adbeda
    - agcopenhaver
    - int3l
    - oblute
    - rluria14
